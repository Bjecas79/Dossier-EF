function trDistributeToGroups(teams, numGroups) {
  const shuffled = [...teams].sort(() => Math.random() - 0.5);
  const perGroup = Math.floor(shuffled.length / numGroups);
  const extra = shuffled.length % numGroups;
  const groups = Array.from({ length: numGroups }, (_, i) => ({ name: 'Grupo '+String.fromCharCode(65+i), teams: [] }));
  let idx = 0;
  for (let g = 0; g < numGroups; g++) {
    const size = perGroup + (g < extra ? 1 : 0);
    for (let j = 0; j < size; j++) groups[g].teams.push(shuffled[idx++]);
  }
  return groups;
}

function trGenerateLeague(teams) {
  const arr = [...teams]; let round=1, matchId=1;
  const isBye = arr.length % 2 !== 0;
  if (isBye) arr.push({ name:'BYE', color:'#888' });
  const rounds = arr.length - 1, half = arr.length / 2;
  const fixed = arr[0], rotating = arr.slice(1);
  const matches = [];
  for (let r = 0; r < rounds; r++) {
    const rt = [fixed, ...rotating];
    for (let i = 0; i < half; i++) {
      const a=rt[i], b=rt[rt.length-1-i];
      if (a.name!=='BYE' && b.name!=='BYE') matches.push({ id:matchId++, round, home:a.name, away:b.name, homeScore:null, awayScore:null, played:false });
    }
    rotating.push(rotating.shift()); round++;
  }
  return matches;
}

function trGenerateMatches() {
  const t = trCurrent();
  if (!t) return;
  if (t.teams.length < 2) { trNotify('⚠️ Precisas de pelo menos 2 equipas!'); return; }
  if (t.matches.length && !confirm('Já existem jogos. Regenerar irá apagar os resultados. Continuar?')) return;
  let matchId = 1;
  if (t.format === 'league') {
    if ((t.numGroups||1) <= 1) { t.matches = trGenerateLeague(t.teams); }
    else {
      const groups = trDistributeToGroups(t.teams, t.numGroups||1);
      t.matches = [];
      groups.forEach(g => { trGenerateLeague(g.teams).forEach(m => { m.id=matchId++; m.group=g.name; t.matches.push(m); }); });
    }
  } else if (t.format === 'knockout') {
    const shuffled = [...t.teams].sort(()=>Math.random()-0.5);
    const slots = trNextPow2(shuffled.length);
    const padded = [...shuffled]; while(padded.length<slots) padded.push(null);
    t.matches = [];
    for (let i=0;i<slots;i+=2) {
      const a=padded[i], b=padded[i+1];
      if(a&&b) t.matches.push({id:matchId++,round:1,home:a.name,away:b.name,homeScore:null,awayScore:null,played:false,knockout:true});
      else if(a||b) { const tm=a||b; t.matches.push({id:matchId++,round:1,home:tm.name,away:'BYE',homeScore:1,awayScore:0,played:true,knockout:true,bye:true}); }
    }
  } else if (t.format === 'swiss') {
    const totalR = t.swissRounds || Math.ceil(Math.log2(t.teams.length));
    const shuffled = [...t.teams].sort(()=>Math.random()-0.5);
    const half = Math.floor(shuffled.length/2);
    t.matches = [];
    for (let i=0;i<half;i++) t.matches.push({id:matchId++,round:1,home:shuffled[i].name,away:shuffled[i+half].name,homeScore:null,awayScore:null,played:false,swiss:true});
    if (shuffled.length%2!==0) t.matches.push({id:matchId++,round:1,home:shuffled[shuffled.length-1].name,away:'BYE',homeScore:1,awayScore:0,played:true,bye:true,swiss:true});
  } else if (t.format === 'double_elim') {
    const shuffled = [...t.teams].sort(()=>Math.random()-0.5);
    const slots = trNextPow2(shuffled.length);
    const padded = shuffled.map(x=>x.name); while(padded.length<slots) padded.push(null);
    t.matches = [];
    for (let i=0;i<slots;i+=2) {
      const a=padded[i], b=padded[i+1];
      if(a&&b) t.matches.push({id:matchId++,bracket:'W',wRound:1,slot:i/2,home:a,away:b,homeScore:null,awayScore:null,played:false,de:true});
      else if(a||b) { const tm=a||b; t.matches.push({id:matchId++,bracket:'W',wRound:1,slot:i/2,home:tm,away:'BYE',homeScore:1,awayScore:0,played:true,de:true,bye:true}); }
    }
  } else { // groups
    const numG = t.groupsNum || 2;
    const qualify = t.groupsQualify || 2;
    const groups = trDistributeToGroups(t.teams, numG);
    t.matches = [];
    groups.forEach(g => { trGenerateLeague(g.teams).forEach(m => { m.id=matchId++; m.group=g.name; m.groupPhase=true; t.matches.push(m); }); });
  }
  trSave();
  trNotify('⚡ ' + t.matches.length + ' jogos gerados!');
  trGoTab('tab-jogos');
}

function trSaveMatch(id) {
  const t = trCurrent();
  if (!t) return;
  const m = t.matches.find(x => x.id === id);
  if (!m) return;
  const hsEl = document.getElementById('tr-hs-'+id);
  const asEl = document.getElementById('tr-as-'+id);
  if (!hsEl || !asEl) return;
  const hs = parseInt(hsEl.value), as2 = parseInt(asEl.value);
  if (isNaN(hs)||isNaN(as2)||hs<0||as2<0) { trNotify('⚠️ Resultado inválido!'); return; }
  if ((t.format==='knockout'||t.format==='double_elim') && hs===as2) { trNotify('⚠️ Em eliminatórias não pode haver empate!'); return; }
  m.homeScore = hs; m.awayScore = as2; m.played = true;
  trSave();
  trGoTab('tab-jogos');
  trNotify('✅ Resultado guardado');
}

function trResetMatches() {
  if (!confirm('Reiniciar todos os resultados?')) return;
  const t = trCurrent();
  if (!t) return;
  t.matches.forEach(m => { if(!m.bye) { m.homeScore=null; m.awayScore=null; m.played=false; } });
  trSave(); trGoTab('tab-jogos');
}

function trAdvanceSwiss() {
  const t = trCurrent(); if (!t) return;
  const matches = t.matches;
  const totalRounds = t.swissRounds || Math.ceil(Math.log2(t.teams.length));
  const playedRounds = [...new Set(matches.map(m=>m.round))];
  const nextRound = playedRounds.length + 1;
  if (nextRound > totalRounds) { trNotify('✅ Todas as rondas já foram geradas!'); return; }
  const standings = trComputeStandings(t);
  const ranked = standings.map(s=>s.name);
  const usedPairs = new Set(matches.map(m=>[m.home,m.away].sort().join('|')));
  const available = [...ranked];
  const newMs = [];
  let matchId = matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  const paired = new Set();
  for (let i=0;i<available.length;i++) {
    if (paired.has(available[i])) continue;
    for (let j=i+1;j<available.length;j++) {
      if (paired.has(available[j])) continue;
      const key = [available[i],available[j]].sort().join('|');
      if (!usedPairs.has(key)) { newMs.push({id:matchId++,round:nextRound,home:available[i],away:available[j],homeScore:null,awayScore:null,played:false,swiss:true}); paired.add(available[i]); paired.add(available[j]); break; }
    }
    if (!paired.has(available[i])) { for(let j=i+1;j<available.length;j++) { if(!paired.has(available[j])) { newMs.push({id:matchId++,round:nextRound,home:available[i],away:available[j],homeScore:null,awayScore:null,played:false,swiss:true}); paired.add(available[i]); paired.add(available[j]); break; } } }
  }
  const unpaired = available.filter(a=>!paired.has(a));
  if (unpaired.length) newMs.push({id:matchId++,round:nextRound,home:unpaired[0],away:'BYE',homeScore:1,awayScore:0,played:true,bye:true,swiss:true});
  t.matches.push(...newMs);
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Ronda '+nextRound+' gerada!');
}

function trAdvanceKnockout() {
  const t = trCurrent(); if (!t) return;
  const rounds = [...new Set(t.matches.map(m=>m.round))].sort((a,b)=>a-b);
  const curR = Math.max(...rounds);
  const curMs = t.matches.filter(m=>m.round===curR);
  const winners = curMs.map(m=>{ if(m.bye) return m.home!=='BYE'?m.home:m.away; if(m.played) return m.homeScore>m.awayScore?m.home:m.away; return null; });
  if (winners.includes(null)) { trNotify('⚠️ Ainda há jogos por disputar!'); return; }
  if (winners.length===1) { trNotify('🏆 '+winners[0]+' é o vencedor!'); return; }
  let participants = [...winners];
  if (participants.length%2!==0) {
    const losers = curMs.filter(m=>m.played&&!m.bye&&m.away!=='BYE').map(m=>{ const ln=m.homeScore>m.awayScore?m.away:m.home; const lgf=m.homeScore>m.awayScore?m.awayScore:m.homeScore; const lga=m.homeScore>m.awayScore?m.homeScore:m.awayScore; return {name:ln,gd:lgf-lga,gf:lgf}; }).sort((a,b)=>b.gd-a.gd||b.gf-a.gf);
    if (losers.length) participants.push(losers[0].name);
  }
  const nextR = curR+1;
  let matchId = t.matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  for (let i=0;i<participants.length;i+=2) {
    const a=participants[i], b=participants[i+1]||null;
    if(a&&b&&b!=='BYE') t.matches.push({id:matchId++,round:nextR,home:a,away:b,homeScore:null,awayScore:null,played:false,knockout:true});
    else if(a) t.matches.push({id:matchId++,round:nextR,home:a,away:'BYE',homeScore:1,awayScore:0,played:true,knockout:true,bye:true});
  }
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Ronda '+nextR+' gerada!');
}

function trGenerateGroupsKO() {
  const t = trCurrent(); if (!t) return;
  const qualify = t.groupsQualify || 2;
  const grpMs = t.matches.filter(m=>m.groupPhase);
  const grpNames = [...new Set(grpMs.map(m=>m.group).filter(Boolean))];
  const grpRankings = {};
  grpNames.forEach(g => { grpRankings[g] = trComputeGroupStandings(grpMs.filter(m=>m.group===g), t.ptsWin, t.ptsDraw); });
  const qualified = [];
  for (let pos=0;pos<qualify;pos++) { grpNames.forEach(g => { const s=grpRankings[g][pos]; if(s) qualified.push(s.name); }); }
  if (!qualified.length) { trNotify('⚠️ Sem equipas qualificadas!'); return; }
  let matchId = t.matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  // Cruzamentos: 1º Grupo A vs 2º Grupo B etc.
  const firsts = grpNames.map(g=>grpRankings[g][0]).filter(Boolean);
  const seconds = grpNames.map(g=>grpRankings[g][1]).filter(Boolean);
  for (let i=0;i<Math.min(firsts.length,seconds.length);i++) {
    const mirror = grpNames.length-1-i;
    const opp = seconds[mirror]||seconds[i];
    t.matches.push({id:matchId++,round:1,home:firsts[i].name,away:opp.name,homeScore:null,awayScore:null,played:false,knockout:true});
  }
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Fase eliminatória gerada!');
}

function trAdvanceDE() {
  const t = trCurrent(); if (!t) return;
  const matches = t.matches;
  let matchId = matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  const wMs = matches.filter(m=>m.de&&m.bracket==='W');
  const lMs = matches.filter(m=>m.de&&m.bracket==='L');
  const gfMs = matches.filter(m=>m.de&&m.bracket==='GF');
  const winner = m => m.bye?(m.home!=='BYE'?m.home:m.away):(m.homeScore>m.awayScore?m.home:m.away);
  const loser = m => m.bye?null:(m.homeScore>m.awayScore?m.away:m.home);
  function pairTeams(teams,bracket,wRound) {
    for (let i=0;i<teams.length;i+=2) {
      const a=teams[i], b=teams[i+1];
      if(a&&b) matches.push({id:matchId++,bracket,wRound,slot:Math.floor(i/2),home:a,away:b,homeScore:null,awayScore:null,played:false,de:true});
      else if(a) matches.push({id:matchId++,bracket,wRound,slot:Math.floor(i/2),home:a,away:'BYE',homeScore:1,awayScore:0,played:true,de:true,bye:true});
    }
  }
  if (gfMs.length > 0) {
    const gf1=gfMs[0]; if(!gf1.played){trNotify('⚠️ Disputa a Grande Final primeiro!');return;}
    if (gfMs.length===1) {
      const gf1W=winner(gf1), wTeam=gf1.home;
      if (gf1W!==wTeam) { matches.push({id:matchId++,bracket:'GF',wRound:gf1.wRound,slot:1,home:gf1.home,away:gf1.away,homeScore:null,awayScore:null,played:false,de:true,gf2:true}); trSave(); trGoTab('tab-jogos'); trNotify('🔥 Jogo decisivo!'); return; }
      else { trNotify('🏆 '+gf1W+' vence!'); return; }
    }
    const gf2=gfMs[gfMs.length-1];
    if(gf2.played){trNotify('🏆 '+winner(gf2)+' vence!');return;}
    trNotify('⚠️ Disputa o jogo decisivo primeiro!'); return;
  }
  const curWR = wMs.length?Math.max(...wMs.map(m=>m.wRound)):0;
  const wRoundMs = wMs.filter(m=>m.wRound===curWR);
  if (!wRoundMs.every(m=>m.played)){trNotify('⚠️ Termina os jogos do bracket Vencedores primeiro!');return;}
  const wWinners=wRoundMs.map(winner).filter(Boolean);
  const wLosers=wRoundMs.map(loser).filter(Boolean);
  const lForThisW=lMs.filter(m=>m.wRound===curWR);
  if (lForThisW.length===0) {
    if (wLosers.length>0) {
      const prevLR=lMs.length?Math.max(...lMs.map(m=>m.wRound)):-1;
      const lPrev=lMs.filter(m=>m.wRound===prevLR);
      const lSurv=lPrev.map(winner).filter(Boolean);
      let lTeams;
      if(!lSurv.length) lTeams=[...wLosers];
      else { const combined=[]; const mx=Math.max(lSurv.length,wLosers.length); for(let i=0;i<mx;i++){if(lSurv[i])combined.push(lSurv[i]);if(wLosers[i])combined.push(wLosers[i]);} lTeams=combined; }
      pairTeams(lTeams,'L',curWR);
      trSave(); trGoTab('tab-jogos'); trNotify('⚡ Bracket Perdedores gerado!'); return;
    }
  } else {
    if(!lForThisW.every(m=>m.played)){trNotify('⚠️ Termina os jogos do bracket Perdedores primeiro!');return;}
  }
  const lSurvivors=lForThisW.map(winner).filter(Boolean);
  if(wWinners.length===1&&lSurvivors.length===1){
    matches.push({id:matchId++,bracket:'GF',wRound:curWR+1,slot:0,home:wWinners[0],away:lSurvivors[0],homeScore:null,awayScore:null,played:false,de:true});
    trSave(); trGoTab('tab-jogos'); trNotify('🏆 Grande Final gerada!'); return;
  }
  pairTeams(wWinners,'W',curWR+1);
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Próxima ronda Vencedores!');
}

function trComputeStandings(t) {
  const map = {};
  t.teams.forEach(team => { map[team.name]={name:team.name,played:0,wins:0,draws:0,losses:0,gf:0,ga:0,gd:0,pts:0}; });
  t.matches.filter(m=>m.played&&!m.bye&&m.away!=='BYE').forEach(m => {
    const h=map[m.home], a=map[m.away]; if(!h||!a) return;
    h.played++;a.played++;h.gf+=m.homeScore;h.ga+=m.awayScore;a.gf+=m.awayScore;a.ga+=m.homeScore;
    if(m.homeScore>m.awayScore){h.wins++;h.pts+=t.ptsWin;a.losses++;}
    else if(m.awayScore>m.homeScore){a.wins++;a.pts+=t.ptsWin;h.losses++;}
    else{h.draws++;a.draws++;h.pts+=t.ptsDraw;a.pts+=t.ptsDraw;}
  });
  Object.values(map).forEach(s=>s.gd=s.gf-s.ga);
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

function trComputeGroupStandings(gMs, ptsWin, ptsDraw) {
  const map={};
  const teams=[...new Set(gMs.flatMap(m=>[m.home,m.away]).filter(n=>n!=='BYE'))];
  teams.forEach(name=>map[name]={name,played:0,wins:0,draws:0,losses:0,gf:0,ga:0,gd:0,pts:0});
  gMs.filter(m=>m.played&&m.away!=='BYE').forEach(m=>{
    const h=map[m.home],a=map[m.away]; if(!h||!a) return;
    h.played++;a.played++;h.gf+=m.homeScore;h.ga+=m.awayScore;a.gf+=m.awayScore;a.ga+=m.homeScore;
    if(m.homeScore>m.awayScore){h.wins++;h.pts+=ptsWin;a.losses++;}
    else if(m.awayScore>m.homeScore){a.wins++;a.pts+=ptsWin;h.losses++;}
    else{h.draws++;a.draws++;h.pts+=ptsDraw;a.pts+=ptsDraw;}
  });
  Object.values(map).forEach(s=>s.gd=s.gf-s.ga);
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

// ══════════════════════════════════════════════════════════════
// TEMPORIZADOR INTRATURMA
// ══════════════════════════════════════════════════════════════
let _trTimer = {
  interval: null,
  phase: 'game',
  state: 'stopped',
  elapsed: 0,
  totalGame: 600,
  totalBreak: 120,
};

function trTimerGetDurations() {
  const gMin = parseFloat(document.getElementById('tr-timer-match-dur')?.value) || 10;
  const bMin = parseFloat(document.getElementById('tr-timer-break-dur')?.value) || 2;
  return { game: Math.round(gMin * 60), brk: Math.round(bMin * 60) };
}

function trTimerUpdateUI() {
  const disp = document.getElementById('tr-timer-display');
  const lbl  = document.getElementById('tr-timer-label');
  const phase = document.getElementById('tr-timer-phase');
  const playBtn = document.getElementById('tr-timer-play');
  if (!disp) return;

  const dur = _trTimer.phase === 'game' ? _trTimer.totalGame : _trTimer.totalBreak;
  const remaining = Math.max(0, dur - _trTimer.elapsed);
  const overtime  = _trTimer.elapsed > dur;
  const showSecs  = overtime ? _trTimer.elapsed - dur : remaining;
  const m = Math.floor(showSecs / 60);
  const s = showSecs % 60;
  const prefix = overtime ? '+' : '';
  disp.textContent = prefix + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  disp.className = 'tr-timer-display';
  disp.style.color = overtime ? '#f87171'
    : _trTimer.state === 'stopped' ? 'rgba(255,255,255,0.35)'
    : _trTimer.state === 'paused'  ? '#fbbf24'
    : _trTimer.phase === 'break'   ? '#fbbf24'
    : '#ffffff';

  // Barra de progresso
  const prog = document.getElementById('tr-timer-progress');
  if (prog) {
    const dur2 = _trTimer.phase === 'game' ? _trTimer.totalGame : _trTimer.totalBreak;
    const pct = Math.min(100, (_trTimer.elapsed / dur2) * 100);
    prog.style.width = pct + '%';
    prog.style.background = overtime ? '#f87171' : _trTimer.phase === 'break' ? '#fbbf24' : '#22c55e';
  }

  if (_trTimer.state === 'stopped') lbl.textContent = 'Parado';
  else if (_trTimer.state === 'paused') lbl.textContent = overtime ? 'Pausado (tempo extra)' : 'Pausado';
  else lbl.textContent = overtime
    ? (_trTimer.phase === 'game' ? '⚠️ Tempo extra!' : '⚠️ Intervalo longo!')
    : (_trTimer.phase === 'game' ? 'A jogar…' : 'Intervalo…');

  if (phase) {
    phase.textContent = _trTimer.phase === 'game' ? '⚽ Jogo' : '☕ Intervalo';
    phase.className = 'tr-timer-phase' + (_trTimer.phase === 'break' ? ' pause-phase' : '');
  }

  if (playBtn) {
    if (_trTimer.state === 'running') {
      playBtn.textContent = '⏸ Pausar';
      playBtn.className = 'btn';
      playBtn.style.cssText = 'width:100%;justify-content:center;font-size:14px;padding:11px;border-radius:10px;background:rgba(217,119,6,0.25);color:#fbbf24;border-color:rgba(217,119,6,0.5)';
    } else {
      playBtn.textContent = _trTimer.state === 'stopped' ? '▶ Iniciar' : '▶ Continuar';
      playBtn.className = 'btn btn-primary';
      playBtn.style.cssText = 'width:100%;justify-content:center;font-size:14px;padding:11px;border-radius:10px';
    }
  }

  if (overtime && _trTimer.state === 'running') {
    disp.style.opacity = (Math.floor(_trTimer.elapsed * 2) % 2 === 0) ? '1' : '0.5';
  } else {
    disp.style.opacity = '1';
  }
}

function trTimerTick() {
  _trTimer.elapsed++;
  trTimerUpdateUI();
  const dur = _trTimer.phase === 'game' ? _trTimer.totalGame : _trTimer.totalBreak;
  if (_trTimer.elapsed === dur) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 150, 300].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = _trTimer.phase === 'game' ? 880 : 660;
        gain.gain.setValueAtTime(0.3, ctx.currentTime + delay/1000);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay/1000 + 0.4);
        osc.start(ctx.currentTime + delay/1000);
        osc.stop(ctx.currentTime + delay/1000 + 0.4);
      });
    } catch(e) {}
  }
}

function trTimerPlay() {
  const { game, brk } = trTimerGetDurations();
  _trTimer.totalGame  = game;
  _trTimer.totalBreak = brk;
  if (_trTimer.state === 'running') {
    clearInterval(_trTimer.interval);
    _trTimer.interval = null;
    _trTimer.state = 'paused';
  } else {
    _trTimer.state = 'running';
    _trTimer.phase = 'game';
    _trTimer.interval = setInterval(trTimerTick, 1000);
  }
  trTimerUpdateUI();
}

function trTimerPause() {
  const { game, brk } = trTimerGetDurations();
  _trTimer.totalGame  = game;
  _trTimer.totalBreak = brk;
  clearInterval(_trTimer.interval);
  _trTimer.interval = null;
  if (_trTimer.phase === 'break' && _trTimer.state === 'running') {
    _trTimer.state = 'stopped';
    _trTimer.elapsed = 0;
    _trTimer.phase = 'game';
  } else {
    _trTimer.phase = 'break';
    _trTimer.elapsed = 0;
    _trTimer.state = 'running';
    _trTimer.interval = setInterval(trTimerTick, 1000);
  }
  trTimerUpdateUI();
}

function trTimerReset() {
  clearInterval(_trTimer.interval);
  _trTimer.interval = null;
  _trTimer.state = 'stopped';
  _trTimer.phase = 'game';
  _trTimer.elapsed = 0;
  const { game, brk } = trTimerGetDurations();
  _trTimer.totalGame  = game;
  _trTimer.totalBreak = brk;
  trTimerUpdateUI();
}

// ── Init torneios ────────────────────────────────────────────
trLoad();

// Arrancar com autenticação
initAuth();
